name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:


permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ci:
    name: Rust CI
    uses: KooshaPari/template-commons/.github/workflows/reusable-rust-ci.yml@main
    with:
      rust-version: stable
      enable-coverage: true

  # Run `cargo deny` on every push and PR so dependency-policy
  # violations (advisories, license, bans) fail the build at the
  # source rather than via the weekly scheduled run.
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # v-latest

      - name: Cache cargo registry & target
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-deny-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-deny-

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          rust-version: stable
          command: check

  security:
    name: Security Audit
    uses: KooshaPari/template-commons/.github/workflows/reusable-security-scan.yml@main
    with:
      language: rust
    secrets:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  phenotype-validate:
    name: Governance Validation
    uses: KooshaPari/phenotypeActions/.github/workflows/validate-governance.yml@main

