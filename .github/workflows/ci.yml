name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:


permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Rust CI
    uses: KooshaPari/template-commons/.github/workflows/reusable-rust-ci.yml@0000000000000000000000000000000000000000 # placeholder SHA; source 404s; no live equivalent (audit 2026-06-05 found no matching file in 15 live org repos; prior candidate KooshaPari/template-commons/.github/workflows/reusable-rust-ci.yml@0000000000000000000000000000000000000000 # placeholder SHA; source 404s; FORK from phenoShared/.github/workflows/reusable/rust-ci.yml@72b9c6cbdb24c49189b0e7c7395d874830d1ed87)
    with:
      rust-version: stable
      enable-coverage: true

  security:
    name: Security Audit
    uses: KooshaPari/template-commons/.github/workflows/reusable-security-scan.yml@0000000000000000000000000000000000000000 # placeholder SHA; source 404s; no live equivalent (audit 2026-06-05 found no matching file in 15 live org repos; prior candidate KooshaPari/template-commons/.github/workflows/reusable-security-scan.yml@0000000000000000000000000000000000000000 # placeholder SHA; source 404s; FORK from phenoShared/.github/workflows/reusable/security-scan.yml@72b9c6cbdb24c49189b0e7c7395d874830d1ed87)
    with:
      language: rust
    secrets:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  phenotype-validate:
    name: Governance Validation
    uses: KooshaPari/phenotypeActions/.github/workflows/validate-governance.yml@0000000000000000000000000000000000000000 # placeholder SHA; source 404s; no live equivalent (audit 2026-06-05 found no matching file in 15 live org repos; prior candidate KooshaPari/phenotypeActions/.github/workflows/validate-governance.yml@0000000000000000000000000000000000000000 # placeholder SHA; source 404s; FORK from PhenoDevOps@edbdfad00abfe2f691b553cce00f0fd9e3485d72)

