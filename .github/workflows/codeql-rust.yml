name: CodeQL (Rust)

on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/workflows/**"
      - "**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - ".github/workflows/**"
      - "**/*.md"
  schedule:
    - cron: '17 4 * * 2'
  workflow_dispatch:
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  analyze:
    name: Analyze (rust)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        with:
          languages: rust
      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        with:
          category: "/language:rust"
